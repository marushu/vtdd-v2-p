openapi: 3.1.0
info:
  title: VTDD Butler Action API
  version: 0.1.0
  description: >
    Canonical OpenAPI template for a user-owned Custom GPT Butler surface.
    Replace the server URL with your own VTDD runtime before importing.
servers:
  - url: https://your-runtime-host.example.workers.dev
    description: User-owned VTDD runtime host
components:
  securitySchemes:
    GatewayBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
      description: >
        Configure this with the same secret value as VTDD_GATEWAY_BEARER_TOKEN
        on your Worker runtime.
  schemas:
    SurfaceContext:
      type: object
      properties:
        surface:
          type: string
        judgmentModelId:
          type: string
      additionalProperties: true
    JudgmentTraceEntry:
      type: object
      properties:
        step:
          type: string
        status:
          type: string
        rationale:
          type: string
      additionalProperties: true
    RuntimeTruthInput:
      type: object
      properties:
        runtimeAvailable:
          type: boolean
        safeFallbackChosen:
          type: boolean
      additionalProperties: true
    ConsentInput:
      type: object
      properties:
        grantedCategories:
          type: array
          items:
            type: string
      additionalProperties: true
    ConversationInput:
      type: object
      properties:
        userText:
          type: string
        currentRepository:
          type: string
      additionalProperties: true
    PolicyInput:
      type: object
      properties:
        actionType:
          type: string
          enum:
            - read
            - summarize
            - issue_create
            - build
            - pr_comment
            - pr_review_submit
            - pr_operation
            - merge
            - deploy_production
            - destructive
            - external_publish
        mode:
          type: string
          enum:
            - read_only
            - execution
        repositoryInput:
          type: string
        targetConfirmed:
          type: boolean
        issueTraceable:
          type: boolean
        go:
          type: boolean
        passkey:
          type: boolean
        runtimeTruth:
          $ref: "#/components/schemas/RuntimeTruthInput"
        consent:
          $ref: "#/components/schemas/ConsentInput"
      additionalProperties: true
    VtddGatewayRequest:
      type: object
      properties:
        phase:
          type: string
          enum:
            - exploration
            - execution
        actorRole:
          type: string
          enum:
            - butler
            - executor
            - reviewer
        conversation:
          $ref: "#/components/schemas/ConversationInput"
        surfaceContext:
          $ref: "#/components/schemas/SurfaceContext"
        judgmentTrace:
          type: array
          items:
            $ref: "#/components/schemas/JudgmentTraceEntry"
        policyInput:
          $ref: "#/components/schemas/PolicyInput"
        continuationContext:
          type: object
          properties: {}
          additionalProperties: true
        memoryRecord:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
    VtddExecuteRequest:
      type: object
      properties:
        phase:
          type: string
          enum:
            - execution
        actorRole:
          type: string
          enum:
            - butler
        surfaceContext:
          $ref: "#/components/schemas/SurfaceContext"
        judgmentTrace:
          type: array
          items:
            $ref: "#/components/schemas/JudgmentTraceEntry"
        policyInput:
          $ref: "#/components/schemas/PolicyInput"
        issueContext:
          type: object
          properties:
            issueNumber:
              type: integer
            issueTitle:
              type: string
            issueUrl:
              type: string
          additionalProperties: true
      additionalProperties: true
    VtddGenericResponse:
      type: object
      properties:
        ok:
          type: boolean
      additionalProperties: true
security:
  - GatewayBearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check whether the VTDD worker is reachable.
      responses:
        "200":
          description: Worker health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/gateway:
    post:
      operationId: vtddGateway
      summary: >
        Evaluate VTDD policy, context resolution, repository candidates, and
        Butler guidance.
      security:
        - GatewayBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VtddGatewayRequest"
      responses:
        "200":
          description: Gateway evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "422":
          description: Request blocked by policy or validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/action/execute:
    post:
      operationId: vtddExecute
      summary: Dispatch bounded VTDD execution, including remote Codex handoff.
      security:
        - GatewayBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VtddExecuteRequest"
      responses:
        "202":
          description: Execution queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "422":
          description: Execution request blocked or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "503":
          description: Execution dispatch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/action/progress:
    get:
      operationId: vtddExecutionProgress
      summary: Read progress for a remote Codex execution request.
      security:
        - GatewayBearerAuth: []
      parameters:
        - name: executionId
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
          description: owner/repo, for example sample-org/vtdd-v2
        - name: issueNumber
          in: query
          required: true
          schema:
            type: integer
        - name: branch
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Current execution progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "503":
          description: Progress lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/retrieve/approval-grant:
    get:
      operationId: vtddRetrieveApprovalGrant
      summary: Retrieve a previously issued approval grant by approvalId.
      security:
        - GatewayBearerAuth: []
      parameters:
        - name: approvalId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval grant found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "404":
          description: Approval grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
