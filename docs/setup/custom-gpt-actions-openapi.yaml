openapi: 3.1.0
info:
  title: VTDD Butler Action API
  version: 0.1.0
  description: Canonical OpenAPI template for a user-owned VTDD Butler surface.
servers:
  - url: https://your-runtime-host.example.workers.dev
security:
  - GatewayBearerAuth: []
components:
  securitySchemes:
    GatewayBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        service:
          type: string
        mode:
          type: string
        autonomyMode:
          type: string
      additionalProperties: true
    VtddGenericResponse:
      type: object
      properties:
        ok:
          type: boolean
      additionalProperties: true
    VtddGatewayRequest:
      type: object
      properties:
        phase:
          type: string
          enum:
            - exploration
            - execution
        actorRole:
          type: string
          enum:
            - butler
            - executor
            - reviewer
        conversation:
          type: object
          properties:
            userText:
              type: string
            currentRepository:
              type: string
          additionalProperties: true
        surfaceContext:
          type: object
          properties:
            surface:
              type: string
            judgmentModelId:
              type: string
          additionalProperties: true
        judgmentTrace:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              status:
                type: string
              rationale:
                type: string
            additionalProperties: true
        policyInput:
          type: object
          properties:
            actionType:
              type: string
              enum:
                - read
                - summarize
                - issue_create
                - build
                - pr_comment
                - pr_review_submit
                - pr_operation
                - merge
                - deploy_production
                - destructive
                - external_publish
            mode:
              type: string
              enum:
                - read_only
                - execution
            repositoryInput:
              type: string
            targetConfirmed:
              type: boolean
            issueTraceable:
              type: boolean
            go:
              type: boolean
            passkey:
              type: boolean
            runtimeTruth:
              type: object
              properties:
                runtimeAvailable:
                  type: boolean
                safeFallbackChosen:
                  type: boolean
              additionalProperties: true
            consent:
              type: object
              properties:
                grantedCategories:
                  type: array
                  items:
                    type: string
              additionalProperties: true
          additionalProperties: true
        continuationContext:
          type: object
          properties:
            executionId:
              type: string
          additionalProperties: true
        memoryRecord:
          type: object
          properties:
            type:
              type: string
          additionalProperties: true
      additionalProperties: true
    VtddExecuteRequest:
      type: object
      properties:
        phase:
          type: string
          enum:
            - execution
        actorRole:
          type: string
          enum:
            - butler
        surfaceContext:
          type: object
          properties:
            surface:
              type: string
            judgmentModelId:
              type: string
          additionalProperties: true
        judgmentTrace:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              status:
                type: string
              rationale:
                type: string
            additionalProperties: true
        policyInput:
          type: object
          properties:
            actionType:
              type: string
              enum:
                - read
                - summarize
                - issue_create
                - build
                - pr_comment
                - pr_review_submit
                - pr_operation
                - merge
                - deploy_production
                - destructive
                - external_publish
            mode:
              type: string
              enum:
                - read_only
                - execution
            repositoryInput:
              type: string
            targetConfirmed:
              type: boolean
            issueTraceable:
              type: boolean
            go:
              type: boolean
            passkey:
              type: boolean
            runtimeTruth:
              type: object
              properties:
                runtimeAvailable:
                  type: boolean
                safeFallbackChosen:
                  type: boolean
              additionalProperties: true
            consent:
              type: object
              properties:
                grantedCategories:
                  type: array
                  items:
                    type: string
              additionalProperties: true
          additionalProperties: true
        issueContext:
          type: object
          properties:
            issueNumber:
              type: integer
            issueTitle:
              type: string
            issueUrl:
              type: string
          additionalProperties: true
      additionalProperties: true
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check whether the VTDD worker is reachable.
      responses:
        "200":
          description: Worker health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v2/gateway:
    post:
      operationId: vtddGateway
      summary: Evaluate VTDD policy, repository candidates, and Butler guidance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VtddGatewayRequest"
      responses:
        "200":
          description: Gateway evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "422":
          description: Request blocked by policy or validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/action/execute:
    post:
      operationId: vtddExecute
      summary: Dispatch bounded VTDD execution, including remote Codex handoff.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VtddExecuteRequest"
      responses:
        "202":
          description: Execution queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "422":
          description: Execution request blocked or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "503":
          description: Execution dispatch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/action/progress:
    get:
      operationId: vtddExecutionProgress
      summary: Read progress for a remote Codex execution request.
      parameters:
        - name: executionId
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: issueNumber
          in: query
          required: true
          schema:
            type: integer
        - name: branch
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Current execution progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "503":
          description: Progress lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
  /v2/retrieve/approval-grant:
    get:
      operationId: vtddRetrieveApprovalGrant
      summary: Retrieve a previously issued approval grant by approvalId.
      parameters:
        - name: approvalId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval grant found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
        "401":
          description: Missing machine auth
        "403":
          description: Invalid machine auth
        "404":
          description: Approval grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VtddGenericResponse"
