name: rotate-setup-wizard-passcode

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SETUP_WIZARD_PASSCODE_VALUE: ${{ secrets.SETUP_WIZARD_PASSCODE_ROTATION_VALUE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --no-save wrangler@4.83.0

      - name: Validate rotation inputs
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$SETUP_WIZARD_PASSCODE_VALUE" ]; then
            echo "Missing SETUP_WIZARD_PASSCODE_ROTATION_VALUE"
            exit 1
          fi

      - name: Rotate production setup wizard passcode
        shell: bash
        run: |
          printf '%s' "$SETUP_WIZARD_PASSCODE_VALUE" | npx wrangler secret put SETUP_WIZARD_PASSCODE --env production
