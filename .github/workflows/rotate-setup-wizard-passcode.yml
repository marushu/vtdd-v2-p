name: rotate-setup-wizard-passcode

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate rotation inputs
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SETUP_WIZARD_PASSCODE_VALUE: ${{ secrets.SETUP_WIZARD_PASSCODE_ROTATION_VALUE }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$SETUP_WIZARD_PASSCODE_VALUE" ]; then
            echo "Missing SETUP_WIZARD_PASSCODE_ROTATION_VALUE"
            exit 1
          fi

      - name: Rotate production setup wizard passcode
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SETUP_WIZARD_PASSCODE_VALUE: ${{ secrets.SETUP_WIZARD_PASSCODE_ROTATION_VALUE }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/services/vtdd-v2-mvp/environments/production/secrets" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @- <<EOF
          {
            "name": "SETUP_WIZARD_PASSCODE",
            "text": "${SETUP_WIZARD_PASSCODE_VALUE}",
            "type": "secret_text"
          }
          EOF
