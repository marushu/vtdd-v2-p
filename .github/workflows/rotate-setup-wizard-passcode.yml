name: rotate-setup-wizard-passcode

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate rotation inputs
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SETUP_WIZARD_PASSCODE_VALUE: ${{ secrets.SETUP_WIZARD_PASSCODE_ROTATION_VALUE }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$SETUP_WIZARD_PASSCODE_VALUE" ]; then
            echo "Missing SETUP_WIZARD_PASSCODE_ROTATION_VALUE"
            exit 1
          fi

      - name: Rotate production setup wizard passcode
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SETUP_WIZARD_PASSCODE_VALUE: ${{ secrets.SETUP_WIZARD_PASSCODE_ROTATION_VALUE }}
        run: |
          for SCRIPT_NAME in vtdd-v2-mvp vtdd-v2-mvp-production; do
            echo "Trying secret rotation for script: ${SCRIPT_NAME}"
            HTTP_CODE=$(curl --silent --show-error \
              -o /tmp/rotate-setup-passcode-response.json \
              -w "%{http_code}" \
              -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}/secrets" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @- <<EOF
          {
            "name": "SETUP_WIZARD_PASSCODE",
            "text": "${SETUP_WIZARD_PASSCODE_VALUE}",
            "type": "secret_text"
          }
          EOF
            )
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Secret rotation succeeded for ${SCRIPT_NAME}"
              cat /tmp/rotate-setup-passcode-response.json
              exit 0
            fi
            echo "Secret rotation failed for ${SCRIPT_NAME} with HTTP ${HTTP_CODE}"
            cat /tmp/rotate-setup-passcode-response.json
          done
          echo "Failed to rotate SETUP_WIZARD_PASSCODE for all known script names"
          exit 1
