name: gemini-pr-review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited

permissions:
  contents: read

concurrency:
  group: gemini-pr-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when PR is draft
        if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.draft == true && github.event.action != 'ready_for_review' }}
        run: |
          echo "Skipping Gemini review for draft pull request."
          exit 0

      - name: Detect GitHub App secret availability
        id: app_secrets
        env:
          VTDD_GITHUB_APP_ID: ${{ secrets.VTDD_GITHUB_APP_ID }}
          VTDD_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VTDD_GITHUB_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$VTDD_GITHUB_APP_ID" ] && [ -n "$VTDD_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when GitHub App secrets are not configured
        if: ${{ steps.app_secrets.outputs.configured != 'true' }}
        run: |
          echo "Skipping Gemini review because VTDD_GITHUB_APP_ID / VTDD_GITHUB_APP_PRIVATE_KEY are not configured."
          exit 0

      - name: Mint GitHub App token
        if: ${{ steps.app_secrets.outputs.configured == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VTDD_GITHUB_APP_ID }}
          private-key: ${{ secrets.VTDD_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        if: ${{ steps.app_secrets.outputs.configured == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        if: ${{ steps.app_secrets.outputs.configured == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install reviewer dependencies
        if: ${{ steps.app_secrets.outputs.configured == 'true' }}
        run: npm ci

      - name: Run Gemini PR review
        if: ${{ steps.app_secrets.outputs.configured == 'true' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REVIEW_MODEL: ${{ vars.GEMINI_REVIEW_MODEL }}
        run: node scripts/run-gemini-pr-review.mjs
