name: deploy-production

on:
  workflow_dispatch:
    inputs:
      approval_phrase:
        description: "Type GO to approve production deploy"
        required: true
        type: string
      runtime_url:
        description: "Worker runtime URL used to validate the real passkey approval grant"
        required: true
        type: string
      approval_grant_id:
        description: "Real WebAuthn/passkey approval grant id for deploy_production"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Enforce GO + passkey boundary
        shell: bash
        run: |
          if [ "${{ github.event.inputs.approval_phrase }}" != "GO" ]; then
            echo "Approval phrase must be GO for production deploy."
            exit 1
          fi
          if [ -z "${{ github.event.inputs.runtime_url }}" ]; then
            echo "runtime_url is required for production deploy."
            exit 1
          fi
          if [ -z "${{ github.event.inputs.approval_grant_id }}" ]; then
            echo "approval_grant_id is required for production deploy."
            exit 1
          fi

      - name: Preflight deploy credentials
        env:
          VTDD_GATEWAY_BEARER_TOKEN: ${{ secrets.VTDD_GATEWAY_BEARER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        shell: bash
        run: |
          missing=0
          if [ -z "$VTDD_GATEWAY_BEARER_TOKEN" ]; then
            echo "Missing required Actions secret: VTDD_GATEWAY_BEARER_TOKEN"
            missing=1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing required Actions secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing required Actions secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "Missing required Actions secret: CLOUDFLARE_D1_DATABASE_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Configure the missing secrets before requesting GO + passkey for production deploy."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate real passkey approval grant
        env:
          VTDD_GATEWAY_BEARER_TOKEN: ${{ secrets.VTDD_GATEWAY_BEARER_TOKEN }}
        run: |
          node scripts/validate-deploy-approval-grant.mjs \
            --runtime-url "${{ github.event.inputs.runtime_url }}" \
            --approval-grant-id "${{ github.event.inputs.approval_grant_id }}" \
            --repository "${{ github.repository }}"

      - name: Run tests
        run: npm test

      - name: Generate production Wrangler config
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME || 'vtdd-memory' }}
          VTDD_GITHUB_ACTIONS_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          cp wrangler.toml wrangler.production.generated.toml
          cat >> wrangler.production.generated.toml <<EOF

          [env.production.vars]
          VTDD_GITHUB_ACTIONS_REPOSITORY = "$VTDD_GITHUB_ACTIONS_REPOSITORY"

          [[env.production.d1_databases]]
          binding = "VTDD_MEMORY_D1"
          database_name = "$CLOUDFLARE_D1_DATABASE_NAME"
          database_id = "$CLOUDFLARE_D1_DATABASE_ID"
          EOF

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.83.0"
          command: deploy --config wrangler.production.generated.toml --env production
